# Contribution Overlap Check - Bitbucket Pipelines
# Installed by: ait setup
# Merge this into your bitbucket-pipelines.yml.
#
# Bitbucket has no issue event triggers, so this runs as a custom pipeline.
# Schedule it via the Bitbucket UI (Repository Settings > Pipelines > Schedules).
# Recommended: every 6 hours.
#
# Bitbucket does not support issue labels via API, so all open issues are
# scanned and the check script filters by contribution metadata presence.
#
# Required repository variables:
#   BITBUCKET_API_USER  - Bitbucket username for API auth
#   BITBUCKET_API_TOKEN - API token with issues read+write scope

pipelines:
  custom:
    contribution-check:
      - step:
          name: Check contribution overlaps
          image: alpine:latest
          script:
            - apk add --no-cache bash curl jq git
            - |
              REPO_SLUG="${BITBUCKET_WORKSPACE}/${BITBUCKET_REPO_SLUG}"
              API_BASE="https://api.bitbucket.org/2.0"
              AUTH="${BITBUCKET_API_USER}:${BITBUCKET_API_TOKEN}"
              # Fetch recent open issues (no label filter available on Bitbucket)
              ISSUES=$(curl -sf -u "$AUTH" \
                "$API_BASE/repositories/$REPO_SLUG/issues?state=open&state=new&pagelen=50&sort=-updated_on" \
                | jq -r '.values[].id')
              for issue_id in $ISSUES; do
                echo "--- Checking issue #$issue_id ---"
                BITBUCKET_USER="$BITBUCKET_API_USER" BITBUCKET_TOKEN="$BITBUCKET_API_TOKEN" \
                  bash ./.aitask-scripts/aitask_contribution_check.sh "$issue_id" \
                  --platform bitbucket --repo "$REPO_SLUG" || true
              done
