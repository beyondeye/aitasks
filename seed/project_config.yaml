# Project-level configuration (git-tracked, shared across team)
#
# This file configures project-specific settings used by the aitask workflow.
# It is copied from seed/ during `ait setup` — edit it to match your project.
#
# For per-user settings (email, etc.), use aitasks/metadata/userconfig.yaml instead.
# For workflow behavior (skip prompts, etc.), use execution profiles in aitasks/metadata/profiles/.
#
# ──────────────────────────────────────────────────────────────────────
# codeagent_coauthor_domain — Email domain for custom AI code-agent commit coauthors.
#
# Used by the shared task-workflow commit-attribution logic for supported
# code agents. The resulting coauthor email format is:
#
#   <agent>@<codeagent_coauthor_domain>
#
# Example:
#
#   # Codex
#   codeagent_coauthor_domain: aitasks.io
#   # → codex@aitasks.io
#
# If omitted or left empty, workflows fall back to `aitasks.io`.
# ──────────────────────────────────────────────────────────────────────

codeagent_coauthor_domain: aitasks.io

# ──────────────────────────────────────────────────────────────────────
# verify_build — Shell command(s) to verify the build after merging.
#
# Used by post-implementation steps in task-workflow, aitask-pickrem, and
# aitask-pickweb to verify the build still passes after implementation.
#
# Options:
#   - Omit or leave empty: build verification is skipped
#   - Single string: one command
#   - List of strings: run each sequentially, stop on first failure
#
# If the build fails due to this task's changes, the agent automatically
# goes back to fix and re-runs. Pre-existing failures are logged and skipped.
#
# Examples by project type:
#
#   # Android (Kotlin/Java with Gradle):
#   verify_build: "JAVA_HOME=/opt/android-studio/jbr ./gradlew assembleDebug"
#
#   # Rust:
#   verify_build: "cargo build"
#
#   # Python:
#   verify_build: "python -m py_compile main.py"
#
#   # Node.js / TypeScript:
#   verify_build: "npm run build"
#
#   # Go:
#   verify_build: "go build ./..."
#
#   # C++ with CMake:
#   verify_build:
#     - "cmake -B build"
#     - "cmake --build build"
#
#   # Multi-step (install + build + test):
#   verify_build:
#     - "npm install"
#     - "npm run build"
#     - "npm test"
# ──────────────────────────────────────────────────────────────────────

verify_build:

# ──────────────────────────────────────────────────────────────────────
# test_command — Shell command(s) to run project tests.
#
# Used by /aitask-qa skill to execute tests and verify test coverage.
# Accepts a single command string or a YAML list of commands.
# Leave blank to let aitask-qa auto-detect tests from project structure.
#
# Examples by project type:
#
#   # Python:
#   test_command: "pytest"
#
#   # JavaScript:
#   test_command: "npm test"
#
#   # Go:
#   test_command: "go test ./..."
#
#   # Rust:
#   test_command: "cargo test"
#
#   # Shell (aitasks):
#   test_command: "bash tests/test_*.sh"
#
#   # Multi-step:
#   test_command:
#     - "npm run unit"
#     - "npm run integration"
# ──────────────────────────────────────────────────────────────────────

test_command:

# ──────────────────────────────────────────────────────────────────────
# lint_command — Shell command(s) to lint/check project code.
#
# Used by /aitask-qa skill to run linting on changed files.
# Accepts a single command string or a YAML list of commands.
# Leave blank to skip linting or let aitask-qa auto-detect.
#
# Examples by project type:
#
#   # Python:
#   lint_command: "ruff check ."
#
#   # JavaScript:
#   lint_command: "eslint ."
#
#   # Go:
#   lint_command: "golangci-lint run"
#
#   # Rust:
#   lint_command: "cargo clippy"
#
#   # Shell:
#   lint_command: "shellcheck .aitask-scripts/aitask_*.sh"
# ──────────────────────────────────────────────────────────────────────

lint_command:

# ──────────────────────────────────────────────────────────────────────
# default_profiles — Default execution profile for each skill.
#
# Maps skill names to profile names (without .yaml extension). When a
# skill starts, it checks this setting before prompting for a profile.
# Users can override per-skill in userconfig.yaml (gitignored, personal).
# The --profile argument on any skill overrides both.
#
# Valid skill names: pick, fold, review, pr-import, revert, explore,
#                    pickrem, pickweb, qa
#
# Resolution order:
#   1. --profile <name> argument (highest priority)
#   2. userconfig.yaml default_profiles.<skill> (personal)
#   3. project_config.yaml default_profiles.<skill> (team)
#   4. Interactive selection / auto-select (fallback)
#
# Examples:
#
#   # Team-wide: use 'fast' for pick, 'default' for review
#   default_profiles:
#     pick: fast
#     review: default
#
#   # Set all interactive skills to 'fast'
#   default_profiles:
#     pick: fast
#     fold: fast
#     review: fast
#     pr-import: fast
#     revert: fast
#     explore: fast
#     qa: fast
#
#   # Remote skills: use 'remote' profile
#   default_profiles:
#     pickrem: remote
#     pickweb: remote
# ──────────────────────────────────────────────────────────────────────

default_profiles:

# ──────────────────────────────────────────────────────────────────────
# tmux — Tmux integration settings.
#
# These settings control how aitasks integrates with tmux sessions.
# ──────────────────────────────────────────────────────────────────────

tmux:
  # ──────────────────────────────────────────────────────────────────
  # default_session — tmux session name used by `ait ide` and other TUIs.
  #
  # Set automatically during `ait setup` (you are prompted for the name
  # with "aitasks" as default). Edit here to change the team default.
  #
  # Example:
  #   default_session: aitasks
  # ──────────────────────────────────────────────────────────────────
  default_session:

  # ──────────────────────────────────────────────────────────────────
  # git_tui — External git management TUI for the TUI switcher.
  #
  # Integrates an external git TUI (like lazygit, gitui, or tig) as a
  # "pseudo-native" TUI in the aitasks TUI switcher (press 'j' / 'g').
  # Only one instance runs per tmux session (singleton behavior).
  #
  # Set to the tool name (e.g., "lazygit") or leave empty to disable.
  # Detected automatically during `ait setup`.
  #
  # Supported tools:
  #   - lazygit  (recommended, most popular)
  #   - gitui    (Rust-based, fast)
  #   - tig      (ncurses-based, lightweight)
  #
  # Example:
  #   git_tui: lazygit
  # ──────────────────────────────────────────────────────────────────
  git_tui:

  # ──────────────────────────────────────────────────────────────────
  # syncer — `ait syncer` TUI for remote desync tracking.
  #
  # The syncer TUI tracks ahead/behind state for the project's tracked
  # refs (`main`, `aitask-data`) and offers pull/push actions. Launch
  # it manually any time with `ait syncer`.
  #
  # autostart — When `true`, `ait ide` opens (or focuses) a singleton
  # `syncer` window inside the project's tmux session, alongside the
  # monitor window that `ait ide` already starts. When `false` or
  # omitted, `ait ide` does not auto-launch the syncer.
  #
  # Default: false (omit, leave blank, or set explicitly to false).
  #
  # Example:
  #   syncer:
  #     autostart: true
  # ──────────────────────────────────────────────────────────────────
  # syncer:
  #   autostart: false

  # ──────────────────────────────────────────────────────────────────
  # monitor — `ait monitor` / `ait minimonitor` settings.
  #
  # The whole `monitor` block is optional; loader defaults apply when
  # omitted. Documented here so the keys are discoverable.
  #
  # compare_mode_default — Idle-detection comparison mode for pane
  # content snapshots:
  #
  #   stripped (default) — strip ANSI escape codes from captured pane
  #     content before equality check. Required to detect Codex CLI
  #     agents as idle: Codex animates the spinner color via SGR escape
  #     codes even while waiting on user input, so a raw byte-equal
  #     comparison declares the pane "changed" every refresh tick.
  #
  #   raw — compare the full captured bytes including escape codes.
  #     Legacy behavior; only useful as a fallback if a future agent
  #     renders idle UI by toggling escape codes that semantically
  #     matter.
  #
  # Per-pane override is available at runtime via the `d` shortcut in
  # `ait monitor` / `ait minimonitor` (cycles default → raw → stripped).
  # ──────────────────────────────────────────────────────────────────
  # monitor:
  #   compare_mode_default: stripped
