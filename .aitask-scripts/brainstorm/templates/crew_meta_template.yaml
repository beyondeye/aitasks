# Default brainstorm agent_types. Configurable via `ait settings` > Agent Defaults.
# Used by aitask_brainstorm_init.sh when creating the brainstorm crew.
# This file is a reference template — the init script registers types
# via --add-type flags to ait crew init, reading overrides from codeagent_config.json.
agent_types:
  explorer:
    agent_string: claudecode/opus4_6
    max_parallel: 2
  comparator:
    agent_string: claudecode/sonnet4_6
    max_parallel: 1
  synthesizer:
    agent_string: claudecode/opus4_6
    max_parallel: 1
  detailer:
    agent_string: claudecode/opus4_6
    max_parallel: 1
  patcher:
    agent_string: claudecode/sonnet4_6
    max_parallel: 1
