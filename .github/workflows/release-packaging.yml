name: Release Packaging

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  publish-homebrew:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Soft-skip if HOMEBREW_TAP_TOKEN is not set
        id: gate
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap publish."
            echo "::warning::See aidocs/homebrew_maintainer_setup.md for first-time setup."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip == 'false'

      - name: Download shim from release & compute SHA256
        if: steps.gate.outputs.skip == 'false'
        id: checksum
        run: |
          curl -fsSL "https://github.com/beyondeye/aitasks/releases/download/v${VERSION}/ait" -o ait
          SHA256=$(sha256sum ait | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Shim SHA256: $SHA256"

      - name: Render formula
        if: steps.gate.outputs.skip == 'false'
        run: |
          mkdir -p tap-out
          sed -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
              -e "s/SHA256_PLACEHOLDER/${{ steps.checksum.outputs.sha256 }}/g" \
              packaging/homebrew/aitasks.rb.template > tap-out/aitasks.rb
          echo "--- Rendered formula ---"
          cat tap-out/aitasks.rb

      - name: Push to tap repo
        if: steps.gate.outputs.skip == 'false'
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/beyondeye/homebrew-aitasks.git" tap-repo
          mkdir -p tap-repo/Formula
          cp tap-out/aitasks.rb tap-repo/Formula/aitasks.rb
          cd tap-repo
          git config user.email "actions@github.com"
          git config user.name "aitasks release bot"
          git add Formula/aitasks.rb
          if git diff --cached --quiet; then
            echo "No formula changes, skipping commit"
          else
            git commit -m "Update aitasks to v${VERSION}"
            git push origin main
          fi

  publish-aur:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - name: Soft-skip if AUR_SSH_PRIVATE_KEY is not set
        id: gate
        run: |
          if [ -z "${AUR_KEY}" ]; then
            echo "::warning::AUR_SSH_PRIVATE_KEY not set — skipping AUR publish."
            echo "::warning::See aidocs/aur_maintainer_setup.md for first-time setup."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip == 'false'

      - name: Download shim from release & compute SHA256
        if: steps.gate.outputs.skip == 'false'
        id: checksum
        run: |
          curl -fsSL "https://github.com/beyondeye/aitasks/releases/download/v${VERSION}/ait" -o ait
          SHA256=$(sha256sum ait | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Shim SHA256: $SHA256"

      - name: Render PKGBUILD
        if: steps.gate.outputs.skip == 'false'
        run: |
          mkdir -p aur-out
          sed -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
              -e "s/SHA256_PLACEHOLDER/${{ steps.checksum.outputs.sha256 }}/g" \
              packaging/aur/PKGBUILD.template > aur-out/PKGBUILD
          echo "--- Rendered PKGBUILD ---"
          cat aur-out/PKGBUILD

      - name: Publish to AUR
        if: steps.gate.outputs.skip == 'false'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: aitasks
          pkgbuild: ./aur-out/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ inputs.version }}"
          ssh_keyscan_types: ed25519

  build-deb:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb (via nfpm Docker image)
        run: |
          docker run --rm \
            -v "$PWD:/tmp/src" -w /tmp/src \
            -e VERSION \
            goreleaser/nfpm:latest \
            package \
              --packager deb \
              --config packaging/nfpm/nfpm.yaml \
              --target "aitasks_${VERSION}_all.deb"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${VERSION}" "aitasks_${VERSION}_all.deb" --clobber

  test-deb:
    needs: build-deb
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu:22.04, ubuntu:24.04, debian:12]
    runs-on: ubuntu-latest
    container: ${{ matrix.distro }}
    env:
      DEBIAN_FRONTEND: noninteractive
      VERSION: ${{ inputs.version }}
    steps:
      - name: Install curl
        run: |
          apt-get update
          apt-get install -y --no-install-recommends curl ca-certificates

      - name: Download .deb from release
        run: |
          curl -fsSL "https://github.com/beyondeye/aitasks/releases/download/v${VERSION}/aitasks_${VERSION}_all.deb" -o /tmp/ait.deb
          ls -la /tmp/ait.deb

      - name: Install
        run: |
          apt-get install -y /tmp/ait.deb

      - name: Verify
        run: |
          test -x /usr/bin/ait
          ait --help 2>&1 | head -10 || true
          # Shim should report "No ait project found" in an empty dir
          cd /tmp
          ait some-command 2>&1 | grep -i "No ait project" || \
            (echo "Shim did not emit expected no-project message"; exit 1)

      - name: Uninstall
        run: |
          apt-get remove -y aitasks
          test ! -e /usr/bin/ait

  build-rpm:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build .rpm (via nfpm Docker image)
        run: |
          docker run --rm \
            -v "$PWD:/tmp/src" -w /tmp/src \
            -e VERSION \
            goreleaser/nfpm:latest \
            package \
              --packager rpm \
              --config packaging/nfpm/nfpm.yaml \
              --target "aitasks-${VERSION}-1.noarch.rpm"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${VERSION}" "aitasks-${VERSION}-1.noarch.rpm" --clobber

  test-rpm:
    needs: build-rpm
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora:41, fedora:42, rockylinux:9]
    runs-on: ubuntu-latest
    container: ${{ matrix.distro }}
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Install curl
        run: dnf install -y --allowerasing curl ca-certificates

      - name: Enable EPEL (Rocky/RHEL/Alma only)
        if: contains(matrix.distro, 'rocky') || contains(matrix.distro, 'almalinux') || contains(matrix.distro, 'rhel')
        run: |
          dnf install -y epel-release || \
            dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm

      - name: Download .rpm from release
        run: |
          curl -fsSL "https://github.com/beyondeye/aitasks/releases/download/v${VERSION}/aitasks-${VERSION}-1.noarch.rpm" -o /tmp/ait.rpm

      - name: Install
        run: dnf install -y /tmp/ait.rpm

      - name: Verify
        run: |
          test -x /usr/bin/ait
          ait --help 2>&1 | head -10 || true
          # Shim should report "No ait project found" in an empty dir
          cd /tmp
          ait some-command 2>&1 | grep -i "No ait project" || \
            (echo "Shim did not emit expected no-project message"; exit 1)

      - name: Uninstall
        run: |
          dnf remove -y aitasks
          test ! -e /usr/bin/ait
