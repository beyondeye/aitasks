name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify VERSION file matches tag
        run: |
          file_version=$(cat .aitask-scripts/VERSION)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$file_version" != "$tag_version" ]; then
            echo "ERROR: VERSION file ($file_version) does not match tag ($tag_version)"
            exit 1
          fi

      - name: Build skills directory from .claude/skills
        run: |
          mkdir -p skills
          for skill_dir in .claude/skills/*/; do
            skill_name="$(basename "$skill_dir")"
            cp -r "$skill_dir" "skills/$skill_name"
          done

      - name: Build codex skills directory from .agents/skills
        run: |
          if [ -d .agents/skills ]; then
            mkdir -p codex_skills
            for skill_dir in .agents/skills/*/; do
              [ -d "$skill_dir" ] || continue
              skill_name="$(basename "$skill_dir")"
              cp -r "$skill_dir" "codex_skills/$skill_name"
            done
            # Copy shared helper docs (codex + gemini)
            for doc in codex_tool_mapping.md codex_interactive_prereqs.md geminicli_tool_mapping.md geminicli_planmode_prereqs.md; do
              if [ -f ".agents/skills/$doc" ]; then
                cp ".agents/skills/$doc" "codex_skills/$doc"
              fi
            done
          fi

      - name: Build opencode skills directory from .opencode/skills
        run: |
          mkdir -p opencode_commands
          if [ -d .opencode/commands ]; then
            cp -r .opencode/commands/. opencode_commands/
          fi
          if [ -d .opencode/skills ]; then
            mkdir -p opencode_skills
            for skill_dir in .opencode/skills/*/; do
              [ -d "$skill_dir" ] || continue
              skill_name="$(basename "$skill_dir")"
              cp -r "$skill_dir" "opencode_skills/$skill_name"
            done
            if [ -f .opencode/skills/opencode_tool_mapping.md ]; then
              cp .opencode/skills/opencode_tool_mapping.md opencode_skills/opencode_tool_mapping.md
            fi
            if [ -f .opencode/skills/opencode_planmode_prereqs.md ]; then
              cp .opencode/skills/opencode_planmode_prereqs.md opencode_skills/opencode_planmode_prereqs.md
            fi
          fi

      - name: Build gemini commands, policies, and helper docs
        run: |
          mkdir -p gemini_commands
          if [ -d .gemini/commands ]; then
            cp -r .gemini/commands/. gemini_commands/
          fi
          mkdir -p gemini_skills
          for doc in geminicli_tool_mapping.md geminicli_planmode_prereqs.md; do
            if [ -f ".gemini/skills/$doc" ]; then
              cp ".gemini/skills/$doc" "gemini_skills/$doc"
            fi
          done
          mkdir -p gemini_policies
          if [ -d .gemini/policies ]; then
            cp -r .gemini/policies/. gemini_policies/
          fi
          if [ -f .gemini/settings.json ]; then
            cp .gemini/settings.json gemini_settings.json
          fi

      - name: Create release tarball
        run: |
          tar -czf aitasks-${{ github.ref_name }}.tar.gz \
            ait \
            CHANGELOG.md \
            .aitask-scripts/ \
            skills/ \
            seed/ \
            codex_skills/ \
            opencode_skills/ \
            opencode_commands/ \
            gemini_skills/ \
            gemini_commands/ \
            gemini_policies/ \
            gemini_settings.json

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            # Extract section between "## vX.Y.Z" and next "## v" heading (or EOF)
            section=$(sed -n "/^## v${version}$/,/^## v/{
              /^## v${version}$/d
              /^## v/d
              p
            }" CHANGELOG.md)
            if [ -n "$section" ]; then
              echo "$section" > /tmp/release_notes.md
              echo "found=true" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release (with changelog)
        if: steps.changelog.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: aitasks-${{ github.ref_name }}.tar.gz
          body_path: /tmp/release_notes.md

      - name: Create GitHub Release (auto-generated notes)
        if: steps.changelog.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: aitasks-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
