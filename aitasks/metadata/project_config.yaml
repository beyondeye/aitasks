project:
  name: aitasks
  git_remote: https://github.com/beyondeye/aitasks.git

codeagent_coauthor_domain: aitasks.io
test_command: null
lint_command: null

# Doc-update spec for the `docs_updated` procedure gate (t635_19). `guide` points
# at this repo's CONFIGURED guide (derived from aidocs/framework/); the gate skill
# reads it, falling back to the generic seeded default when absent. `extra_guides`
# (optional) layers additional references on top.
doc_update:
  guide: aitasks/metadata/doc_update_guide.md
  # extra_guides: []
default_profiles:
  explore: fast
  pick: fast
tmux:
  monitor:
    refresh_seconds: 3
    idle_threshold_seconds: 5
    capture_lines: 200
    agent_window_prefixes:
    - agent-
    # Idle-detection compare mode: "stripped" (default) ignores ANSI escape
    # codes — required to detect Codex CLI agents as idle. "raw" compares
    # full bytes (legacy). Per-pane override via `d` in monitor / minimonitor.
    compare_mode_default: stripped
  applink:
    # Ceiling (max depth) for a single on-demand scrollback capture served by
    # the applink "history" RPC. Decoupled from monitor.capture_lines (live
    # frames only need the viewport); per-request depth is sized to
    # `viewport + count` and clamped to this value. Clamped to [1, 10000] at
    # load, and itself bounded by tmux's server `history-limit` (~2000).
    history_capture_lines: 2000
    # Advertised-endpoint override for the pairing QR (t1061_1) — see
    # aidocs/applink/protocol.md §Pairing flow "Endpoint & trust model" and
    # the commented reference in seed/project_config.yaml. Advertisement-only
    # (bind stays 0.0.0.0). Any --advertise-* CLI flag makes the CLI define
    # the whole override and these keys are ignored. A mesh DNS name is
    # firewall-classified as external — use the numeric mesh IP for
    # interface-scoped firewall guidance.
    # advertised_host: 100.101.102.103   # FQDN or IP (host[:port] accepted)
    # advertised_port: 8765              # default: serving port
    # advertised_kind: mesh              # lan | mesh | tunnel
    # advertised_trust: pin              # pin | ca
    # Auto-spawned Cloudflare Quick Tunnel (t1061_3): advertise a public
    # *.trycloudflare.com hostname as a CA-trusted alternate endpoint in the
    # pairing QR (LAN stays primary). Requires cloudflared on PATH; one-shot
    # CLI equivalent: --auto-tunnel. See aidocs/applink/tunnel_howto.md.
    # auto_tunnel: cloudflared
  default_session: aitasks
  default_split: horizontal
  prefer_tmux: true
  git_tui: lazygit
  shadow_pane_width: 60
