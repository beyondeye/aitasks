codeagent_coauthor_domain: aitasks.io
test_command: null
lint_command: null
default_profiles:
  explore: fast
  pick: fast
tmux:
  monitor:
    refresh_seconds: 3
    idle_threshold_seconds: 5
    capture_lines: 200
    agent_window_prefixes:
    - agent-
    tui_window_names:
    - board
    - codebrowser
    - settings
    - brainstorm
    - monitor
    - minimonitor
    - diffviewer
    - git
  default_session: aitasks
  default_split: horizontal
  prefer_tmux: true
  git_tui: lazygit
