# aitasks gate registry
#
# Declares the named verification checkpoints ("gates") a task can opt into via
# its `gates:` frontmatter list. The task file remains authoritative for *which*
# gates apply and *what happened* (the "## Gate Runs" ledger appended by
# `./.aitask-scripts/aitask_gate.sh`); this registry declares *how* each gate is
# described and classified.
#
# Phase 1 (t635_1) seeded the minimal substrate (`type` + `description`). The
# orchestrator schema below (t635_11) adds verifier / max_retries / unlocks /
# timeout_seconds / signal. See aidocs/gates/aitask-gate-framework.md.
#
# type:
#   machine - verified programmatically (build, tests, automated evaluation)
#   human   - requires a person's sign-off (the interactive approval, or later an
#             async signal)
#
# Orchestrator schema (t635_11) — read by lib/gate_orchestrator.py:
#   verifier        - command the orchestrator runs as
#                     `<verifier> <task-id> <attempt> <run-id>`, exit codes
#                     0=pass 1=fail 2=skip 3=error (4=pending is HUMAN-ONLY). A
#                     bare `aitask-gate-<x>` resolves to
#                     .aitask-scripts/aitask_gate_<x>.sh; a path runs directly.
#                     EMPTY (or absent) = no auto-run (recorded by the workflow /
#                     a human, not executed). Concrete verifiers land in later
#                     children (build/tests t635_12, risk t635_13, docs t635_19);
#                     they stay empty here.
#   max_retries     - re-attempts after a failure (int, default 0 = single shot).
#   timeout_seconds - max wall-clock for one machine-gate run (optional).
#   unlocks         - gates this gate unlocks on pass. ABSENT (key omitted) =
#                     LINEAR default (unlocks the next gate in the task's `gates:`
#                     list). An explicit list overrides — e.g. `unlocks: [b, c]`
#                     for a parallel fan-out — while an explicit `unlocks: []`
#                     means TERMINAL (unlocks nothing). Absent and `[]` are
#                     DISTINCT: do NOT write `unlocks: []` just to "fill in" a
#                     gate, or it stops being linear. (None below declare it, so
#                     gate order follows each task's `gates:` list.)
#   skip (exit 2)   - "evaluated, not applicable": TERMINAL-SATISFIED — unlocks
#                     successors and never blocks archive/dependents, but stays
#                     distinct from `pass` in the ledger history.
#   signal / signal_target (HUMAN gates) - t635_11 ships READ-SIDE `file-touch`
#                     detection only: the orchestrator appends `pass` when
#                     `signal_target` exists (`<task-id>`→`t<id>`, `<gate>`
#                     substituted), else `pending`; it NEVER creates the signal.
#                     Signal CREATION (`ait gate pass`), `signal: comment`, and
#                     polling arrive in t635_15. The interactive checkpoint gates
#                     below are signalled by the workflow's approval, not
#                     file-touch, so they declare no signal_target.
#
#   Parallel fan-out example (illustrative — not enabled here):
#     lint:
#       type: machine
#       verifier: aitask-gate-lint
#       unlocks: [tests_pass]        # lint must pass before tests run
#     tests_pass:
#       type: machine
#       verifier: aitask-gate-tests
#       max_retries: 3
#       unlocks: [docs_updated, review]   # parallel fan-out once tests pass
#
# blocks_dependents (t635_3):
#   true  - this gate is REQUIRED to pass before tasks that `depends:` on the
#           owning task unblock. Set on the "integration" gates — the points at
#           which the task's code becomes available for dependents to build on.
#   false - passing this gate does NOT gate dependents (pre-code checkpoints, and
#           later post-integration sign-offs like async review / docs / manual
#           verification, which would otherwise block dependents for days).
#   A task unblocks its dependents once ALL its declared blocks_dependents gates
#   pass; a per-task `also_blocks_dependents:` list adds further required gates.
#   See aidocs/gates/dependency-unblock-semantics.md.

gates:
  plan_approved:
    type: human
    description: "Implementation plan reviewed and approved before coding begins"
    blocks_dependents: false
  risk_evaluated:
    type: machine
    description: "Plan assessed for code-health and goal-achievement risk"
    blocks_dependents: false
    # verifier populated by t635_13 (risk-evaluation gate); empty = no auto-run.
    verifier: ""
    max_retries: 0
  build_verified:
    type: machine
    description: "Project build/verify command(s) pass after implementation"
    blocks_dependents: true
    # verifier populated by t635_12 (build/tests machine gate); empty = no auto-run.
    verifier: ""
    max_retries: 1
    timeout_seconds: 600
  review_approved:
    type: human
    description: "Implemented changes reviewed and approved before commit"
    blocks_dependents: true
  merge_approved:
    type: human
    description: "Merge of the task branch into the base branch approved"
    blocks_dependents: true
